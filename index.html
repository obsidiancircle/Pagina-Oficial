<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Circle</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
    body{background:#0b0f1a;color:white}

    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:20px 40px;position:fixed;width:100%;top:0;
      background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);
      z-index:1000;
    }

    header a{
      background:#f97316;padding:10px 20px;border-radius:10px;
      text-decoration:none;color:white;font-weight:500;
    }

    .hero{
      height:100vh;display:flex;flex-direction:column;
      justify-content:center;align-items:center;text-align:center;
      background:linear-gradient(180deg,#0b0f1a,#111827);
      padding:20px;
    }

    .hero h2{font-size:52px;margin-bottom:10px}
    .hero p{color:#9ca3af;margin-bottom:30px}

    .btn{
      background:#f97316;padding:14px 28px;border-radius:12px;
      text-decoration:none;color:white;border:none;cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{transform:scale(1.05)}

    .gallery{
      padding:60px 20px;text-align:center;
    }

    .gallery-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;margin-top:30px;
    }

    .gallery img{
      width:100%;border-radius:15px;transition:0.3s;
    }

    .gallery img:hover{transform:scale(1.05)}

    .packages{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;padding:40px;
    }

    .card{
      background:#111827;padding:25px;border-radius:20px;
      transition:0.3s;border:1px solid rgba(255,255,255,0.05);
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);
      box-shadow:0 20px 40px rgba(0,0,0,0.6);
    }

    .price{font-size:32px;margin:10px 0}

    .section{
      text-align:center;padding:60px 20px;
    }

    .section p{color:#9ca3af;max-width:600px;margin:auto}

    .contact form{
      max-width:400px;margin:auto;margin-top:20px;
</html>
